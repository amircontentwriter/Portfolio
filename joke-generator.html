<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joke Generator</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
        button { padding: 10px 20px; font-size: 16px; }
        .joke { margin-top: 20px; font-size: 24px; text-align: center; }
    </style>
</head>
<body>
    <h1>Random Joke Generator</h1>
    <button id="jokeButton">Get a Joke</button>
    <div class="joke" id="joke"></div>

    <script>
        async function fetchJoke() {
            const response = await fetch('https://v2.jokeapi.dev/joke/Any');
            const data = await response.json();
            if (data.setup) {
                return `${data.setup} - ${data.delivery}`;
            } else {
                return data.joke;
            }
        }

        document.getElementById('jokeButton').addEventListener('click', async () => {
            const joke = await fetchJoke();
            document.getElementById('joke').innerText = joke;
        });
    </script>
</body>
</html>
